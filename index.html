<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        H1{
            color: #0000ff; /* 16진수 표기법 */
            text-align: center;
            /* text-shadow:가로거리 세로거리 번짐정도 색상; */
            text-shadow: 1px 1px 5px #333;
        }
        h2{
            color: pink;
            text-shadow: 2px 2px 5px #0000ff;
            letter-spacing: 10px;
        }
        p{
            color: green; /* 색상 이름 표기법 */
            text-align: right;
            /* 줄 간격 조절 */
            /* line-height: 50px; */
            /* line-height: 2.0; */
        
        }
        span{
            color: rgb(255, 0, 0); /* rgb 표기법 */
            /* font: weight 900px; */
            font-weight: bold;
        }
        .hanra{
            color: orangered;
            font-weight: 400;
        }
        .orange{
            color: orange;
        }
        .yellow{
            color: yellow;
        }
        .blue{
            color: blue;
        }
        em{
            font-size: 14px;
            color: rgba(0, 0, 0, 0.8);
        }
        .box{
            width: 200px;
            height: 200px;
            background-color: aqua;
            text-align: center;
            line-height: 200px;
        }
        .boxx{
            width: 100px;
            height: 100px;
            background-color: bisque;
            text-align: center;
            line-height: 100px;
            /* text-decoration: underline; */
            /* text-decoration: overline; */
        }

    </style>
</head>
<body>
    <h1>레드향</h1>
    <h2>므엥</h2>
    <p>껍질에 붉은 빛이 돌아 <span>레드향</span> 이라 불린다</p>
    <p class="yellow">레드향은 <span class="hanra">한라봉</span>과 <span class="orange">귤</span>을 교배한 것으로</p>
    <p class="blue">일반 귤보다 2~3배 크고, 과육이 <em>붉고 통통</em>하다</p>
    <!-- 박스 안에 글자 중간 정렬 -->
     <div class="box">박스 - 1</div>
     <div class="boxx">박스 - 2</div>
     <!-- <p class="box"></p> -->
      <a href="https://www.google.com/?hl=ko">구글로 이동</a>
</body>
</html>
